<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimalist Layer Image Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-title">Minimalist Editor</div>
    <div class="size-chip-wrap">
      <button class="size-chip" id="size-chip">1024 × 1024 ▾</button>
      <div class="size-menu" id="size-menu" hidden>
        <button data-ratio="1:1">1:1 Square · 1024×1024</button>
        <button data-ratio="16:9">16:9 Landscape · 1920×1080</button>
        <button data-ratio="9:16">9:16 Portrait · 1080×1920</button>
        <button data-ratio="4:5">4:5 Vertical · 1080×1350</button>
        <div class="size-custom">
          <input type="number" id="canvas-width" value="1024" min="64" max="4096" aria-label="Width">
          <span>×</span>
          <input type="number" id="canvas-height" value="1024" min="64" max="4096" aria-label="Height">
          <button id="size-custom-apply">Apply</button>
        </div>
      </div>
    </div>
    <button class="btn btn-primary btn-export" id="btn-export">Export</button>
  </header>
  <div class="dashboard-wrapper">
    <!-- COLUMN 1: Layers & Sources -->
    <aside class="panel left-panel">
      <h2>Layers & Sources</h2>
      <div class="layer-creation-buttons">
        <button class="btn btn-primary" id="btn-add-image">+ Add Image Layer</button>
        <button class="btn btn-secondary" id="btn-add-text">+ Add Text Layer</button>
      </div>
      
      <div class="upload-zone" id="upload-zone">
        <p>Drag-and-drop, manual upload, or paste (Ctrl+V)</p>
        <input type="file" id="file-input" accept="image/*" style="display: none;">
      </div>

      <div class="layers-list" id="layers-list-container">
        <!-- Dynamic layer cards will be injected here -->
      </div>
    </aside>

    <!-- COLUMN 2: Canvas Preview -->
    <main class="panel center-panel">
      <h2>Canvas Preview</h2>
      <div class="canvas-controls">
        <span class="control-label">Background:</span>
        <div class="theme-toggles">
          <button class="btn btn-theme active" data-bg="transparent">Transparent</button>
          <button class="btn btn-theme" data-bg="white">White</button>
          <button class="btn btn-theme" data-bg="black">Black</button>
          <button class="btn btn-theme" data-bg="custom">Custom</button>
        </div>
        <input type="color" id="bg-color-picker" value="#ffffff" style="display: none;">
      </div>

      <div class="canvas-container" id="canvas-container">
        <div class="canvas-viewport checkerboard-bg" id="canvas-viewport">
          <!-- Dynamic DOM layer preview elements will be rendered here -->
        </div>
      </div>
    </main>

    <!-- COLUMN 3: Properties Panel -->
    <aside class="panel right-panel">
      <h2>Properties</h2>

      <!-- No Active Layer Warning -->
      <div id="no-active-warning" class="properties-warning">
        Select a layer to edit properties.
      </div>

      <div id="properties-editor-container" style="display: none;">
        <!-- Common Properties -->
        <section class="config-section">
          <h3>Common Properties</h3>
          <div class="control-row">
            <label for="prop-name">Layer Name</label>
            <input type="text" id="prop-name">
          </div>
          
          <div class="control-row">
            <label for="prop-opacity">Opacity</label>
            <div class="slider-group">
              <input type="range" id="prop-opacity" min="0" max="100" value="100">
              <div class="slider-labels">
                <span>0%</span>
                <input type="number" id="prop-opacity-num" min="0" max="100" value="100">%
                <span>100%</span>
              </div>
            </div>
          </div>

          <div class="control-row">
            <label for="prop-blend">Blending Mode</label>
            <select id="prop-blend">
              <option value="normal">Normal</option>
              <option value="multiply">Multiply</option>
              <option value="screen">Screen</option>
              <option value="overlay">Overlay</option>
              <option value="darken">Darken</option>
              <option value="lighten">Lighten</option>
            </select>
          </div>
        </section>

        <!-- Transforms & Positioning -->
        <section class="config-section">
          <h3>Transformations</h3>
          <div class="control-row">
            <label for="prop-x-offset">X Offset (%)</label>
            <input type="range" id="prop-x-offset" min="-100" max="100" value="0">
            <span class="value-display" id="x-offset-value">0%</span>
          </div>
          
          <div class="control-row">
            <label for="prop-y-offset">Y Offset (%)</label>
            <input type="range" id="prop-y-offset" min="-100" max="100" value="0">
            <span class="value-display" id="y-offset-value">0%</span>
          </div>

          <div class="control-row">
            <label for="prop-scale">Scale (%)</label>
            <input type="range" id="prop-scale" min="10" max="400" value="100">
            <span class="value-display" id="scale-value">100%</span>
          </div>
        </section>

        <!-- Filters & Effects (Visible for Images, optional for Text) -->
        <section class="config-section" id="section-filters">
          <h3>Filters & Effects</h3>
          <div class="control-row">
            <label for="prop-blur">Blur (px)</label>
            <input type="range" id="prop-blur" min="0" max="20" value="0">
            <span class="value-display" id="blur-value">0px</span>
          </div>

          <div class="control-row filter-image-only">
            <label for="prop-contrast">Contrast (%)</label>
            <input type="range" id="prop-contrast" min="0" max="200" value="100">
            <span class="value-display" id="contrast-value">100%</span>
          </div>

          <div class="control-row filter-image-only">
            <label for="prop-saturation">Saturation (%)</label>
            <input type="range" id="prop-saturation" min="0" max="200" value="100">
            <span class="value-display" id="saturation-value">100%</span>
          </div>

          <div class="control-row filter-image-only">
            <label for="prop-brightness">Brightness (%)</label>
            <input type="range" id="prop-brightness" min="0" max="200" value="100">
            <span class="value-display" id="brightness-value">100%</span>
          </div>

          <div class="control-row inline-row">
            <label for="prop-invert">Invert Colors</label>
            <input type="checkbox" id="prop-invert">
          </div>
        </section>

        <!-- Text Properties (Visible for Text Layers only) -->
        <section class="config-section" id="section-text-properties" style="display: none;">
          <h3>Text Settings</h3>
          <div class="control-row">
            <label for="prop-text-content">Text Content</label>
            <textarea id="prop-text-content" rows="3"></textarea>
          </div>

          <div class="control-row">
            <label for="prop-font-family">Font Family</label>
            <select id="prop-font-family">
              <option value="Inter">Inter</option>
              <option value="sans-serif">System Sans</option>
              <option value="serif">Serif</option>
              <option value="monospace">Monospace</option>
            </select>
          </div>

          <div class="control-row">
            <label for="prop-font-size">Font Size (px)</label>
            <input type="range" id="prop-font-size" min="8" max="120" value="32">
            <span class="value-display" id="font-size-value">32px</span>
          </div>

          <div class="control-row inline-row">
            <label for="prop-text-color">Text Color</label>
            <input type="color" id="prop-text-color" value="#000000">
          </div>
        </section>
      </div>

    </aside>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
